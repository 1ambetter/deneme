<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="explosion">
            <img class="logo" src="./images/bazarada.png" alt="The logo of Bazarada">
            <p class="interior-text">Bazarada, hepsi bir arada.</p>
    </div>
</body>

<style>
    body{
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        border: 2px solid beige;
        justify-content: center;
        align-items: center;
        background: #191919;
    }

    .explosion{
        transition: 2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 250px;
        width: 400px;
        border-radius: 15px;
        background-color: beige;
    }

    .explosion:hover{
        transition: 2s;
        box-shadow: 0 0 20px 20px rgb(255, 98, 0),
                    0 0 50px 40px rgb(255, 98, 0);


 
    }

    .logo{
        margin-top: 20px;
        border-radius: 10px;
        height: 90px;
        width: 200px;
        
    }

    .interior-text{
        font-weight: bolder;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

</style>






</html>
